# -----------------------------------------------------------------
# CI/CD: Build Docker image → Push to ACR → Deploy to Azure App Service
# Triggers on every push to `main`
# -----------------------------------------------------------------
name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:          # allows manual trigger from GitHub UI

env:
  ACR_NAME: formfilleracr               # Azure Container Registry name (lowercase, no dashes)
  IMAGE_NAME: formfiller-backend
  RESOURCE_GROUP: formfiller-rg
  APP_SERVICE_NAME: formfiller-backend   # Azure Web App name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Login to Azure Container Registry
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # 4. Build & push Docker image
      - name: Build and push image
        run: |
          IMAGE_TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      # 5. Deploy to Azure Web App for Containers
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
